<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小蓝书 Bluebook</title>
<style>
/* ========== 全局重置与基础样式 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --klein-blue: #002FA7;
  --klein-blue-light: rgba(0, 47, 167, 0.08);
  --klein-blue-mid: rgba(0, 47, 167, 0.15);
  --bg: #f5f5f5;
  --white: #ffffff;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-light: #999999;
  --border: #eeeeee;
  --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

html, body {
  font-family: var(--font-stack);
  background: #e0e0e0;
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100%;
}

/* ========== App 容器 — 模拟手机屏幕 ========== */
#app {
  max-width: 420px;
  margin: 0 auto;
  height: 100%;
  background: var(--bg);
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
}

/* ========== 顶部状态栏 ========== */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 52px;
  background: var(--white);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
  border-bottom: 1px solid var(--border);
}

.top-bar .logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--klein-blue);
  letter-spacing: 0.5px;
}

.top-bar .logo span {
  font-weight: 400;
  font-size: 13px;
  color: var(--text-light);
  margin-left: 6px;
  letter-spacing: 1px;
}

/* ========== 视图容器通用样式 ========== */
.view {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding-top: 52px;
  padding-bottom: 56px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
}

.view.active {
  display: block;
}

/* ========== 首页 — 瀑布流容器 ========== */
#view-home .masonry-wrap {
  padding: 16px;
  position: relative;
}

.masonry-col {
  position: absolute;
  top: 0;
  width: calc((100% - 12px) / 2);
}

.masonry-col.left {
  left: 0;
}

.masonry-col.right {
  right: 0;
}

/* ========== 笔记卡片 ========== */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.2s ease;
  margin-bottom: 12px;
}

.card:active {
  opacity: 0.85;
  transform: scale(0.98);
}

.card-img-wrap {
  width: 100%;
  overflow: hidden;
  background: #e8e8e8;
  position: relative;
}

.card-img-wrap img {
  width: 100%;
  display: block;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.card-img-wrap img.loaded {
  opacity: 1;
}

.card-body {
  padding: 10px 10px 8px;
}

.card-title {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-user {
  display: flex;
  align-items: center;
  gap: 5px;
  flex: 1;
  min-width: 0;
}

.card-user img {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  flex-shrink: 0;
}

.card-user span {
  font-size: 11px;
  color: var(--text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.card-icon-btn {
  display: flex;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  padding: 2px;
  cursor: pointer;
  outline: none;
}

.card-icon-btn svg {
  width: 14px;
  height: 14px;
  stroke: var(--text-light);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: all 0.2s ease;
}

.card-icon-btn span {
  font-size: 11px;
  color: var(--text-light);
  transition: color 0.2s ease;
}

.card-icon-btn.liked svg {
  fill: var(--klein-blue);
  stroke: var(--klein-blue);
}

.card-icon-btn.liked span {
  color: var(--klein-blue);
}

.card-icon-btn.starred svg {
  fill: #E6A700;
  stroke: #E6A700;
}

.card-icon-btn.starred span {
  color: #E6A700;
}

/* ========== 搜索视图 ========== */
#view-search {
  background: var(--white);
}

.search-header {
  padding: 16px 20px 12px;
}

.search-input-wrap {
  position: relative;
}

.search-input-wrap input {
  width: 100%;
  border: none;
  border-bottom: 2px solid var(--klein-blue);
  padding: 8px 0 8px 28px;
  font-size: 15px;
  font-family: var(--font-stack);
  color: var(--text-primary);
  background: transparent;
  outline: none;
  transition: border-color 0.2s ease;
}

.search-input-wrap input::placeholder {
  color: var(--text-light);
}

.search-input-wrap svg {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  stroke: var(--klein-blue);
  fill: none;
  stroke-width: 2;
}

.search-results {
  padding: 8px 0;
}

.search-result-item {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  cursor: pointer;
  transition: background 0.2s ease;
}

.search-result-item:active {
  background: var(--klein-blue-light);
}

.search-result-item img {
  width: 56px;
  height: 56px;
  border-radius: 2px;
  object-fit: cover;
  margin-right: 12px;
  flex-shrink: 0;
  background: #eee;
}

.search-result-info {
  flex: 1;
  min-width: 0;
}

.search-result-info .title {
  font-size: 14px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.search-result-info .user {
  font-size: 12px;
  color: var(--text-light);
}

.search-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
  font-size: 14px;
}

.search-initial {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-light);
  font-size: 14px;
}

.search-initial svg {
  width: 40px;
  height: 40px;
  stroke: var(--border);
  fill: none;
  stroke-width: 1.5;
  margin-bottom: 12px;
}

/* ========== 发布视图 ========== */
#view-publish {
  background: var(--white);
}

.publish-form {
  padding: 20px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 10px 12px;
  font-size: 14px;
  font-family: var(--font-stack);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s ease;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--klein-blue);
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: #ccc;
}

.form-group textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}

.form-group .hint {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 4px;
}

.form-group .error-msg {
  font-size: 12px;
  color: #e53e3e;
  margin-top: 4px;
  display: none;
}

.form-group.has-error input,
.form-group.has-error textarea {
  border-color: #e53e3e;
}

.form-group.has-error .error-msg {
  display: block;
}

.publish-submit {
  width: 100%;
  height: 44px;
  background: var(--klein-blue);
  color: var(--white);
  border: none;
  border-radius: 2px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font-stack);
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.2s ease;
  letter-spacing: 1px;
}

.publish-submit:active {
  opacity: 0.85;
  transform: scale(0.98);
}

.publish-success {
  text-align: center;
  padding: 80px 20px;
  display: none;
}

.publish-success svg {
  width: 48px;
  height: 48px;
  stroke: var(--klein-blue);
  fill: none;
  stroke-width: 2;
  margin-bottom: 16px;
}

.publish-success .msg {
  font-size: 16px;
  font-weight: 600;
  color: var(--klein-blue);
}

/* ========== 通知视图 ========== */
#view-notify {
  background: var(--white);
}

.notify-list {
  padding: 8px 0;
}

.notify-item {
  display: flex;
  align-items: flex-start;
  padding: 14px 20px;
  cursor: pointer;
  transition: background 0.2s ease;
  position: relative;
  border-left: 3px solid transparent;
}

.notify-item.unread {
  border-left-color: var(--klein-blue);
  background: rgba(0, 47, 167, 0.02);
}

.notify-item.read {
  border-left-color: #ddd;
}

.notify-item:active {
  background: var(--klein-blue-light);
}

.notify-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: 12px;
  flex-shrink: 0;
}

.notify-icon.blue {
  background: var(--klein-blue-light);
}

.notify-icon.blue svg {
  stroke: var(--klein-blue);
}

.notify-icon.gold {
  background: rgba(230, 167, 0, 0.1);
}

.notify-icon.gold svg {
  stroke: #E6A700;
}

.notify-icon svg {
  width: 18px;
  height: 18px;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.notify-body {
  flex: 1;
  min-width: 0;
}

.notify-body .content {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.notify-body .time {
  font-size: 12px;
  color: var(--text-light);
}

/* ========== 我的视图 ========== */
#view-profile {
  background: var(--white);
}

.profile-header {
  padding: 32px 20px 20px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.profile-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  margin: 0 auto 12px;
  display: block;
}

.profile-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.profile-bio {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 20px;
}

.profile-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.profile-stat {
  text-align: center;
}

.profile-stat .num {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.profile-stat .label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

.profile-section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  padding: 16px 20px 8px;
}

.profile-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 16px 20px;
}

.profile-grid-item {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
  background: #eee;
}

.profile-grid-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.4s ease;
  opacity: 0;
}

.profile-grid-item img.loaded {
  opacity: 1;
}

.profile-grid-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px 0;
  color: var(--text-light);
  font-size: 14px;
}

/* ========== 底部导航栏 ========== */
.tab-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 56px;
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
  transition: transform 0.3s ease;
}

.tab-bar.hidden {
  transform: translateY(100%);
}

.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  padding: 4px 0;
  -webkit-user-select: none;
  user-select: none;
  background: none;
  border: none;
  outline: none;
  min-width: 50px;
  transition: opacity 0.2s ease;
}

.tab-item svg {
  width: 22px;
  height: 22px;
  stroke: var(--text-secondary);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: all 0.2s ease;
}

.tab-item span {
  font-size: 10px;
  color: var(--text-light);
  transition: color 0.2s ease;
}

.tab-item.active svg {
  stroke: var(--klein-blue);
}

.tab-item.active span {
  color: var(--klein-blue);
  font-weight: 600;
}

/* 不同tab的active填充风格 */
.tab-item[data-tab="home"].active svg {
  fill: var(--klein-blue);
}

.tab-item[data-tab="search"].active svg {
  stroke: var(--klein-blue);
  stroke-width: 2.2;
}

.tab-item[data-tab="notify"].active svg {
  fill: var(--klein-blue);
}

.tab-item[data-tab="profile"].active svg {
  fill: var(--klein-blue);
}

/* 发布按钮特殊样式 */
.tab-item.publish-btn {
  position: relative;
}

.publish-circle {
  width: 40px;
  height: 40px;
  background: var(--klein-blue);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0, 47, 167, 0.3);
  margin-top: -18px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.publish-circle:active {
  transform: scale(0.92);
}

.publish-circle svg {
  stroke: var(--white);
  fill: none;
  stroke-width: 2.2;
  width: 20px;
  height: 20px;
}

.tab-item.publish-btn span {
  margin-top: 1px;
}

/* ========== 笔记详情页 ========== */
#detail-page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--white);
  z-index: 200;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

#detail-page.visible {
  transform: translateX(0);
}

.detail-header {
  position: sticky;
  top: 0;
  width: 100%;
  height: 48px;
  background: var(--white);
  display: flex;
  align-items: center;
  padding: 0 16px;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}

.detail-back {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  transition: opacity 0.2s ease;
}

.detail-back:active {
  opacity: 0.5;
}

.detail-back svg {
  width: 20px;
  height: 20px;
  stroke: var(--klein-blue);
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.detail-header-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--klein-blue);
  margin-left: 8px;
}

.detail-image {
  width: 100%;
  background: #e8e8e8;
  min-height: 200px;
}

.detail-image img {
  width: 100%;
  display: block;
}

.detail-content {
  padding: 16px;
  padding-bottom: 70px;
}

.detail-user-row {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
}

.detail-user-row img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin-right: 10px;
}

.detail-username {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}

.detail-follow-btn {
  font-size: 12px;
  color: var(--klein-blue);
  border: 1px solid var(--klein-blue);
  border-radius: 2px;
  padding: 4px 14px;
  background: none;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
  font-family: var(--font-stack);
}

.detail-follow-btn:active {
  background: var(--klein-blue-light);
}

.detail-follow-btn.followed {
  background: var(--klein-blue-light);
  border-color: var(--klein-blue-mid);
  color: var(--text-light);
}

.detail-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 12px;
}

.detail-text {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

/* 互动栏 */
.detail-actions {
  display: flex;
  gap: 24px;
  padding: 16px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.action-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  outline: none;
  transition: transform 0.2s ease;
  font-family: var(--font-stack);
}

.action-btn:active {
  transform: scale(0.9);
}

.action-btn svg {
  width: 20px;
  height: 20px;
  stroke: var(--text-secondary);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: all 0.2s ease;
}

.action-btn span {
  font-size: 13px;
  color: var(--text-light);
  transition: color 0.2s ease;
}

.action-btn.liked svg.heart-icon {
  fill: var(--klein-blue);
  stroke: var(--klein-blue);
}

.action-btn.liked span {
  color: var(--klein-blue);
}

.action-btn.starred svg.star-icon {
  fill: #E6A700;
  stroke: #E6A700;
}

.action-btn.starred span {
  color: #E6A700;
}

/* 评论区 */
.comment-section-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 14px;
}

.comment-item {
  display: flex;
  margin-bottom: 16px;
}

.comment-item img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  margin-right: 10px;
  flex-shrink: 0;
}

.comment-body {
  flex: 1;
}

.comment-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 3px;
}

.comment-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
}

/* 评论输入框 */
.comment-input-bar {
  position: sticky;
  bottom: 0;
  left: 0;
  width: 100%;
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 8px 12px;
  gap: 8px;
}

.comment-input-bar input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 8px 12px;
  font-size: 14px;
  font-family: var(--font-stack);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s ease;
  background: var(--bg);
}

.comment-input-bar input:focus {
  border-color: var(--klein-blue);
}

.comment-input-bar input::placeholder {
  color: #ccc;
}

.comment-send-btn {
  background: var(--klein-blue);
  color: var(--white);
  border: none;
  border-radius: 2px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-stack);
  cursor: pointer;
  transition: opacity 0.2s ease;
  white-space: nowrap;
}

.comment-send-btn:active {
  opacity: 0.8;
}

/* ========== Toast 提示 ========== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 10px 24px;
  border-radius: 4px;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.2s ease, transform 0.2s ease;

}

.toast.show {

  transform: translate(-50%, -50%) scale(1);
}

// ========== 通知数据 ==========
const NOTIFICATIONS = [
  { id: 1, type: 'bell', icon: 'bell', content: '欢迎加入小蓝书 Bluebook 🎉 开始分享你的生活吧！', time: Date.now() - 3 * 60 * 1000, read: false },
  { id: 2, type: 'heart', icon: 'heart', content: '你的笔记「极简主义生活指南」获得了 3 个赞', time: Date.now() - 28 * 60 * 1000, read: false },
  { id: 3, type: 'star', icon: 'star', content: '你的笔记「建筑光影」被 2 人收藏', time: Date.now() - 2 * 3600 * 1000, read: false },
  { id: 4, type: 'comment', icon: 'comment', content: '白噪音 评论了你的笔记：「深有同感，上周刚清理了一半的衣柜」', time: Date.now() - 5 * 3600 * 1000, read: false },
  { id: 5, type: 'bell', icon: 'bell', content: '系统更新：新增发布功能，快来试试吧！', time: Date.now() - 24 * 3600 * 1000, read: false }
];

// ========== 用户信息 ==========
const CURRENT_USER = '蓝书用户';

// ========== 数据持久化管理 ==========
const STORAGE_KEY = 'bluebook_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      return data;
    }
  } catch (e) {
    console.warn('读取 localStorage 失败，使用默认数据');
  }
  return null;
}

function saveData() {
  const data = {
    notes: notes,
    likes: Array.from(likedNotes),
    stars: Array.from(starredNotes),
    followedUsers: Array.from(followedUsers),
    notifications: notifications,
    nextId: nextId
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// 初始化数据
let savedData = loadData();
let notes = savedData ? savedData.notes : JSON.parse(JSON.stringify(DEFAULT_NOTES));
let likedNotes = savedData ? new Set(savedData.likes) : new Set();
let starredNotes = savedData ? new Set(savedData.stars) : new Set();
let followedUsers = savedData ? new Set(savedData.followedUsers) : new Set();
let notifications = savedData ? savedData.notifications : JSON.parse(JSON.stringify(NOTIFICATIONS));
let nextId = savedData ? (savedData.nextId || 11) : 11;

// ========== 全局状态 ==========
let currentTab = 'home';
let previousView = 'home';   // 详情页返回目标视图
let viewScrollY = { home: 0, search: 0, publish: 0, notify: 0, profile: 0 };

// ========== Toast 提示 ==========
function showToast(msg, duration) {
  duration = duration || 1500;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ========== 相对时间格式化 ==========
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return '刚刚';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + ' 分钟前';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + ' 小时前';
  const day = Math.floor(hr / 24);
  if (day < 30) return day + ' 天前';
  return Math.floor(day / 30) + ' 个月前';
}

// ========== 获取笔记图片URL ==========
function getNoteImgUrl(note) {
  if (note.imgUrl) return note.imgUrl;
  return `https://picsum.photos/seed/blue${note.id}/${note.imgW || 400}/${note.imgH || 400}`;
}

// ========== 获取头像URL ==========
function getAvatarUrl(name, size) {
  size = size || 40;
  return `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&size=${size}&font-size=0.4`;
}

// ========== 获取笔记有效点赞数 ==========
function getLikeCount(note) {
  return note.likes + (likedNotes.has(note.id) ? 1 : 0);
}

// ========== 获取笔记有效评论数 ==========
function getCommentCount(note) {
  return (note.commentList ? note.commentList.length : 0);
}

// ========== Tab 切换 ==========
function switchTab(tab) {
  // 保存当前视图滚动位置
  const curView = document.getElementById('view-' + currentTab);
  if (curView) viewScrollY[currentTab] = curView.scrollTop;

  currentTab = tab;

  // 更新导航栏选中状态
  document.querySelectorAll('.tab-item').forEach(item => {
    item.classList.toggle('active', item.dataset.tab === tab);
  });

  // 切换视图显示
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const targetView = document.getElementById('view-' + tab);
  if (targetView) {
    targetView.classList.add('active');
    targetView.scrollTop = viewScrollY[tab] || 0;
  }

  // 切换到特定视图时刷新内容
  if (tab === 'home') renderFeed();
  if (tab === 'notify') renderNotifications();
  if (tab === 'profile') renderProfile();
}

// ========== 首页 — 瀑布流渲染 ==========
let layoutTimer = null;

function renderFeed() {
  const colLeft = document.getElementById('colLeft');
  const colRight = document.getElementById('colRight');
  colLeft.innerHTML = '';
  colRight.innerHTML = '';

  let leftH = 0, rightH = 0;

  notes.forEach(note => {
    const card = createCardElement(note);
    // 根据图片高度预估分配列
    const estH = (note.imgH || 400) * 0.8 + 80; // 粗略估计卡片高度
    if (leftH <= rightH) {
      colLeft.appendChild(card);
      leftH += estH;
    } else {
      colRight.appendChild(card);
      rightH += estH;
    }
  });

  // 图片加载后重新布局
  scheduleRelayout();
}

function createCardElement(note) {
  const imgUrl = getNoteImgUrl(note);
  const avatarUrl = getAvatarUrl(note.user, 40);
  const isLiked = likedNotes.has(note.id);
  const isStarred = starredNotes.has(note.id);

  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-id', note.id);

  card.innerHTML = `
    <div class="card-img-wrap">
      <img src="${imgUrl}" alt="${note.title}" onload="this.classList.add('loaded'); scheduleRelayout();" />
    </div>
    <div class="card-body">
      <div class="card-title">${escHtml(note.title)}</div>
      <div class="card-meta">
        <div class="card-user">
          <img src="${avatarUrl}" alt="${escHtml(note.user)}" />
          <span>${escHtml(note.user)}</span>
        </div>
        <div class="card-actions">
          <button class="card-icon-btn like-btn ${isLiked ? 'liked' : ''}" onclick="toggleCardLike(event, ${note.id})" title="点赞">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span>${getLikeCount(note)}</span>
          </button>
          <button class="card-icon-btn star-btn ${isStarred ? 'starred' : ''}" onclick="toggleCardStar(event, ${note.id})" title="收藏">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span>${isStarred ? 1 : 0}</span>
          </button>
        </div>
      </div>
    </div>
  `;

  // 点击卡片进入详情
  card.addEventListener('click', (e) => {
    if (e.target.closest('.card-icon-btn')) return;
    previousView = 'home';
    openDetail(note.id);
  });

  return card;
}

// ========== JS 动态瀑布流布局重算 ==========
function scheduleRelayout() {
  if (layoutTimer) clearTimeout(layoutTimer);
  layoutTimer = setTimeout(relayoutMasonry, 100);
}

function relayoutMasonry() {
  const wrap = document.getElementById('masonryWrap');
  const colLeft = document.getElementById('colLeft');
  const colRight = document.getElementById('colRight');
  if (!wrap || !colLeft || !colRight) return;

  // 收集所有卡片
  const allCards = Array.from(colLeft.querySelectorAll('.card')).concat(
    Array.from(colRight.querySelectorAll('.card'))
  );

  // 暂时从DOM取出来
  colLeft.innerHTML = '';
  colRight.innerHTML = '';

  let leftH = 0, rightH = 0;

  allCards.forEach(card => {
    const cardH = card.offsetHeight || 200;
    if (leftH <= rightH) {
      colLeft.appendChild(card);
      leftH += cardH + 12; // 12px margin-bottom
    } else {
      colRight.appendChild(card);
      rightH += cardH + 12;
    }
  });
}

// 窗口resize时重新布局
window.addEventListener('resize', () => {
  scheduleRelayout();
});

// ========== 卡片点赞切换 ==========
function toggleCardLike(e, id) {
  e.stopPropagation();
  const note = notes.find(n => n.id === id);
  if (!note) return;

  if (likedNotes.has(id)) {
    likedNotes.delete(id);
  } else {
    likedNotes.add(id);
  }

  // 更新当前按钮
  const el = e.currentTarget;
  el.classList.toggle('liked', likedNotes.has(id));
  el.querySelector('span').textContent = getLikeCount(note);

  saveData();
}

// ========== 卡片收藏切换 ==========
function toggleCardStar(e, id) {
  e.stopPropagation();

  if (starredNotes.has(id)) {
    starredNotes.delete(id);
  } else {
    starredNotes.add(id);
  }

  const el = e.currentTarget;
  el.classList.toggle('starred', starredNotes.has(id));
  el.querySelector('span').textContent = starredNotes.has(id) ? 1 : 0;

  saveData();
}

// ========== 详情页 ==========
let currentDetailId = null;

function openDetail(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;

  currentDetailId = id;

  const imgUrl = getNoteImgUrl(note);
  const avatarUrl = getAvatarUrl(note.user, 64);
  const isLiked = likedNotes.has(id);
  const isStarred = starredNotes.has(id);
  const isFollowed = followedUsers.has(note.user);
  const commentCount = getCommentCount(note);

  let commentsHtml = '';
  if (note.commentList) {
    note.commentList.forEach(c => {
      const cAvatar = getAvatarUrl(c.user, 48);
      commentsHtml += `
        <div class="comment-item">
          <img src="${cAvatar}" alt="${escHtml(c.user)}" />
          <div class="comment-body">
            <div class="comment-name">${escHtml(c.user)}</div>
            <div class="comment-text">${escHtml(c.text)}</div>
          </div>
        </div>
      `;
    });
  }

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-image">
      <img src="${imgUrl}" alt="${escHtml(note.title)}" />
    </div>
    <div class="detail-content">
      <div class="detail-user-row">
        <img src="${avatarUrl}" alt="${escHtml(note.user)}" />
        <div class="detail-username">${escHtml(note.user)}</div>
        <button class="detail-follow-btn ${isFollowed ? 'followed' : ''}" onclick="toggleFollow(this, '${escAttr(note.user)}')">
          ${isFollowed ? '已关注' : '关注'}
        </button>
      </div>
      <div class="detail-title">${escHtml(note.title)}</div>
      <div class="detail-text">${escHtml(note.text)}</div>
      <div class="detail-actions">
        <button class="action-btn like-action ${isLiked ? 'liked' : ''}" onclick="toggleDetailLike(this, ${note.id})">
          <svg class="heart-icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span>${getLikeCount(note)}</span>
        </button>
        <button class="action-btn star-action ${isStarred ? 'starred' : ''}" onclick="toggleDetailStar(this, ${note.id})">
          <svg class="star-icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>${isStarred ? 1 : 0}</span>
        </button>
        <button class="action-btn">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>${commentCount}</span>
        </button>
      </div>
      <div class="comment-section-title">评论 (${commentCount})</div>
      <div class="comment-list" id="detailCommentList">${commentsHtml}</div>
    </div>
    <div class="comment-input-bar">
      <input type="text" id="commentInput" placeholder="写下你的评论..." />
      <button class="comment-send-btn" onclick="sendComment()">发送</button>
    </div>
  `;

  // 显示详情页，隐藏导航栏
  document.getElementById('detail-page').classList.add('visible');
  document.getElementById('tabBar').classList.add('hidden');
  document.getElementById('detail-page').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('detail-page').classList.remove('visible');
  document.getElementById('tabBar').classList.remove('hidden');

  // 回到之前的视图
  if (currentTab !== previousView) {
    switchTab(previousView);
  } else {
    // 刷新当前视图以同步状态
    if (currentTab === 'home') renderFeed();
    else if (currentTab === 'profile') renderProfile();
  }
}

document.getElementById('detailBack').addEventListener('click', closeDetail);

// ========== 详情页点赞切换（同步到全局） ==========
function toggleDetailLike(btn, id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;

  if (likedNotes.has(id)) {
    likedNotes.delete(id);
  } else {
    likedNotes.add(id);
  }

  btn.classList.toggle('liked', likedNotes.has(id));
  btn.querySelector('span').textContent = getLikeCount(note);
  saveData();
}

// ========== 详情页收藏切换（同步到全局） ==========
function toggleDetailStar(btn, id) {
  if (starredNotes.has(id)) {
    starredNotes.delete(id);
  } else {
    starredNotes.add(id);
  }

  btn.classList.toggle('starred', starredNotes.has(id));
  btn.querySelector('span').textContent = starredNotes.has(id) ? 1 : 0;
  saveData();
}

// ========== 关注切换 ==========
function toggleFollow(btn, username) {
  if (followedUsers.has(username)) {
    followedUsers.delete(username);
    btn.classList.remove('followed');
    btn.textContent = '关注';
  } else {
    followedUsers.add(username);
    btn.classList.add('followed');
    btn.textContent = '已关注';
  }
  saveData();
}

// ========== 发送评论 ==========
function sendComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;

  const note = notes.find(n => n.id === currentDetailId);
  if (!note) return;

  if (!note.commentList) note.commentList = [];
  note.commentList.push({ user: CURRENT_USER, text: text });

  // 更新评论区
  const commentList = document.getElementById('detailCommentList');
  const cAvatar = getAvatarUrl(CURRENT_USER, 48);
  const newComment = document.createElement('div');
  newComment.className = 'comment-item';
  newComment.innerHTML = `
    <img src="${cAvatar}" alt="${escHtml(CURRENT_USER)}" />
    <div class="comment-body">
      <div class="comment-name">${escHtml(CURRENT_USER)}</div>
      <div class="comment-text">${escHtml(text)}</div>
    </div>
  `;
  commentList.appendChild(newComment);

  // 更新评论数标题
  const countTitle = document.querySelector('.comment-section-title');
  if (countTitle) countTitle.textContent = `评论 (${getCommentCount(note)})`;

  // 更新评论按钮数字
  const commentBtn = document.querySelector('.action-btn:not(.like-action):not(.star-action) span');
  if (commentBtn) commentBtn.textContent = getCommentCount(note);

  input.value = '';
  saveData();
}

// ========== 搜索视图 ==========
function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const resultsEl = document.getElementById('searchResults');

  if (!query) {
    resultsEl.innerHTML = `
      <div class="search-initial">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div>搜索你感兴趣的内容</div>
      </div>
    `;
    return;
  }

  const results = notes.filter(n =>
    n.title.toLowerCase().includes(query) ||
    n.text.toLowerCase().includes(query) ||
    n.user.toLowerCase().includes(query)
  );

  if (results.length === 0) {
    resultsEl.innerHTML = '<div class="search-empty">未找到相关笔记</div>';
    return;
  }

  let html = '<div class="search-results">';
  results.forEach(note => {
    const imgUrl = getNoteImgUrl(note);
    html += `
      <div class="search-result-item" onclick="openDetailFromSearch(${note.id})">
        <img src="${imgUrl}" alt="${escHtml(note.title)}" />
        <div class="search-result-info">
          <div class="title">${escHtml(note.title)}</div>
          <div class="user">${escHtml(note.user)}</div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  resultsEl.innerHTML = html;
}

function openDetailFromSearch(id) {
  previousView = 'search';
  openDetail(id);
}

// ========== 发布视图 ==========
function handlePublish() {
  const titleInput = document.getElementById('pubTitle');
  const imgUrlInput = document.getElementById('pubImgUrl');
  const textInput = document.getElementById('pubText');
  const userInput = document.getElementById('pubUser');

  let hasError = false;

  // 校验标题
  const fgTitle = document.getElementById('fg-title');
  if (!titleInput.value.trim()) {
    fgTitle.classList.add('has-error');
    hasError = true;
  } else {
    fgTitle.classList.remove('has-error');
  }

  // 校验图片URL（如果有输入则验证格式）
  const fgImgUrl = document.getElementById('fg-imgUrl');
  const imgUrlVal = imgUrlInput.value.trim();
  if (imgUrlVal && !imgUrlVal.match(/^https?:\/\/.+/)) {
    fgImgUrl.classList.add('has-error');
    hasError = true;
  } else {
    fgImgUrl.classList.remove('has-error');
  }

  if (hasError) return;

  // 生成新笔记
  const newId = nextId++;
  const heights = [280, 320, 360, 400, 440, 480, 520, 560];
  const randH = heights[Math.floor(Math.random() * heights.length)];

  const newNote = {
    id: newId,
    imgW: 400,
    imgH: randH,
    imgUrl: imgUrlVal || '',
    title: titleInput.value.trim(),
    text: textInput.value.trim() || '',
    user: userInput.value.trim() || CURRENT_USER,
    likes: 0,
    commentList: [],
    timestamp: Date.now()
  };

  // 添加到数组最前面
  notes.unshift(newNote);
  saveData();

  // 清空表单
  titleInput.value = '';
  imgUrlInput.value = '';
  textInput.value = '';
  userInput.value = CURRENT_USER;

  showToast('发布成功！');

  // 跳转回首页
  setTimeout(() => {
    switchTab('home');
  }, 500);
}

// ========== 通知视图 ==========
function renderNotifications() {
  const list = document.getElementById('notifyList');
  if (!list) return;

  let html = '';
  notifications.forEach(n => {
    const iconSvg = getNotifyIconSvg(n.icon);
    const iconClass = (n.icon === 'star') ? 'gold' : 'blue';
    const readClass = n.read ? 'read' : 'unread';

    html += `
      <div class="notify-item ${readClass}" data-nid="${n.id}" onclick="markNotifyRead(${n.id})">
        <div class="notify-icon ${iconClass}">${iconSvg}</div>
        <div class="notify-body">
          <div class="content">${escHtml(n.content)}</div>
          <div class="time">${timeAgo(n.time)}</div>
        </div>
      </div>
    `;
  });

  list.innerHTML = html;
}

function getNotifyIconSvg(type) {
  const icons = {
    bell: '<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
    heart: '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
    star: '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
    comment: '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>'
  };
  return icons[type] || icons.bell;
}

function markNotifyRead(id) {
  const n = notifications.find(x => x.id === id);
  if (n && !n.read) {
    n.read = true;
    const el = document.querySelector(`.notify-item[data-nid="${id}"]`);
    if (el) {
      el.classList.remove('unread');
      el.classList.add('read');
    }
    saveData();
  }
}

// ========== 我的视图 ==========
function renderProfile() {
  const content = document.getElementById('profileContent');
  if (!content) return;

  const avatarUrl = getAvatarUrl(CURRENT_USER, 128);

  // 统计数据
  const myNotes = notes.filter(n => n.user === CURRENT_USER);
  const totalLikes = myNotes.reduce((sum, n) => sum + getLikeCount(n), 0);
  const totalStars = myNotes.reduce((sum, n) => sum + (starredNotes.has(n.id) ? 1 : 0), 0);

  let gridHtml = '';
  if (myNotes.length > 0) {
    myNotes.forEach(note => {
      const imgUrl = getNoteImgUrl(note);
      gridHtml += `
        <div class="profile-grid-item" onclick="openDetailFromProfile(${note.id})">
          <img src="${imgUrl}" alt="${escHtml(note.title)}" onload="this.classList.add('loaded')" />
        </div>
      `;
    });
  } else {
    gridHtml = '<div class="profile-grid-empty">还没有发布笔记，去发布第一篇吧 ✍️</div>';
  }

  content.innerHTML = `
    <div class="profile-header">
      <img class="profile-avatar" src="${avatarUrl}" alt="${escHtml(CURRENT_USER)}" />
      <div class="profile-name">${escHtml(CURRENT_USER)}</div>
      <div class="profile-bio">极简生活，记录日常美好</div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="num">${myNotes.length}</div>
          <div class="label">笔记</div>
        </div>
        <div class="profile-stat">
          <div class="num">${totalLikes}</div>
          <div class="label">获赞</div>
        </div>
        <div class="profile-stat">
          <div class="num">${totalStars}</div>
          <div class="label">收藏</div>
        </div>
      </div>
    </div>
    <div class="profile-section-title">我的笔记</div>
    <div class="profile-grid">${gridHtml}</div>
  `;
}

function openDetailFromProfile(id) {
  previousView = 'profile';
  openDetail(id);
}

// ========== 工具函数 ==========
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ========== 初始化 ==========
renderFeed();
renderNotifications();
renderProfile();
</script>
